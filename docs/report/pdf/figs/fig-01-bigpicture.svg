<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Inter','Noto Sans KR',sans-serif" font-size="13">
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c84a3a"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fafafa"/>

  <!-- Zone backgrounds -->
  <rect x="32" y="48" width="240" height="450" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
  <rect x="296" y="48" width="368" height="450" rx="8" fill="#ffffff" stroke="#0f2c59" stroke-width="1.5"/>
  <rect x="688" y="48" width="240" height="450" rx="8" fill="#ffffff" stroke="#d4d4d8"/>

  <!-- Zone labels -->
  <text x="152" y="36" text-anchor="middle" fill="#5b5b62" font-size="11" letter-spacing="2" font-weight="700">HUMAN BOARD</text>
  <text x="480" y="36" text-anchor="middle" fill="#0f2c59" font-size="11" letter-spacing="2" font-weight="700">CONTROL PLANE — Paperclip</text>
  <text x="808" y="36" text-anchor="middle" fill="#5b5b62" font-size="11" letter-spacing="2" font-weight="700">EXECUTION PLANE — Adapters &amp; Agents</text>

  <!-- Board: human + UI -->
  <rect x="60" y="80" width="184" height="64" rx="6" fill="#fde7e3" stroke="#c84a3a"/>
  <text x="152" y="105" text-anchor="middle" fill="#1a1a2e" font-weight="700">Board Operator</text>
  <text x="152" y="123" text-anchor="middle" fill="#5b5b62" font-size="11">approve · pause · override</text>
  <text x="152" y="138" text-anchor="middle" fill="#5b5b62" font-size="11">set budgets · review</text>

  <rect x="60" y="172" width="184" height="60" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="152" y="196" text-anchor="middle" fill="#1a1a2e" font-weight="700">React Board UI</text>
  <text x="152" y="214" text-anchor="middle" fill="#5b5b62" font-size="11">Vite · shadcn/ui · TanStack</text>

  <rect x="60" y="252" width="184" height="56" rx="6" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="152" y="274" text-anchor="middle" fill="#1a1a2e" font-weight="600">Board API key</text>
  <text x="152" y="290" text-anchor="middle" fill="#5b5b62" font-size="11">full-control session</text>

  <rect x="60" y="328" width="184" height="56" rx="6" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="152" y="350" text-anchor="middle" fill="#1a1a2e" font-weight="600">CLI · `paperclipai`</text>
  <text x="152" y="366" text-anchor="middle" fill="#5b5b62" font-size="11">onboard / configure / doctor</text>

  <rect x="60" y="404" width="184" height="80" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-dasharray="3 3"/>
  <text x="152" y="426" text-anchor="middle" fill="#5b5b62" font-size="11">Mobile / web access</text>
  <text x="152" y="446" text-anchor="middle" fill="#5b5b62" font-size="11">approvals · status</text>
  <text x="152" y="466" text-anchor="middle" fill="#5b5b62" font-size="11">monitoring</text>

  <!-- Control plane internals -->
  <rect x="320" y="80" width="320" height="48" rx="6" fill="#dde7f3" stroke="#0f2c59"/>
  <text x="480" y="100" text-anchor="middle" fill="#0f2c59" font-weight="700">REST API · /api (Express)</text>
  <text x="480" y="116" text-anchor="middle" fill="#5b5b62" font-size="11">single endpoint surface — board &amp; agents</text>

  <rect x="320" y="140" width="148" height="48" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="394" y="160" text-anchor="middle" fill="#1a1a2e" font-weight="600">Routes</text>
  <text x="394" y="176" text-anchor="middle" fill="#5b5b62" font-size="11">companies · issues · agents…</text>

  <rect x="492" y="140" width="148" height="48" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="566" y="160" text-anchor="middle" fill="#1a1a2e" font-weight="600">Realtime · WebSocket</text>
  <text x="566" y="176" text-anchor="middle" fill="#5b5b62" font-size="11">/api/companies/:cid/events/ws</text>

  <rect x="320" y="200" width="320" height="64" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="480" y="222" text-anchor="middle" fill="#1a1a2e" font-weight="700">Services · orchestration</text>
  <text x="480" y="240" text-anchor="middle" fill="#5b5b62" font-size="11">heartbeat scheduler · checkout · approvals</text>
  <text x="480" y="256" text-anchor="middle" fill="#5b5b62" font-size="11">budget enforcement · activity log · recovery</text>

  <rect x="320" y="276" width="148" height="48" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="394" y="296" text-anchor="middle" fill="#1a1a2e" font-weight="600">Drizzle ORM</text>
  <text x="394" y="312" text-anchor="middle" fill="#5b5b62" font-size="11">schema · migrations</text>

  <rect x="492" y="276" width="148" height="48" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="566" y="296" text-anchor="middle" fill="#1a1a2e" font-weight="600">Storage</text>
  <text x="566" y="312" text-anchor="middle" fill="#5b5b62" font-size="11">local_disk · s3</text>

  <rect x="320" y="336" width="320" height="56" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="480" y="358" text-anchor="middle" fill="#1a1a2e" font-weight="700">PostgreSQL</text>
  <text x="480" y="376" text-anchor="middle" fill="#5b5b62" font-size="11">PGlite / embedded-postgres / Supabase</text>

  <rect x="320" y="404" width="148" height="80" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="394" y="424" text-anchor="middle" fill="#1a1a2e" font-weight="600">MCP Server</text>
  <text x="394" y="440" text-anchor="middle" fill="#5b5b62" font-size="11">packages/mcp-server</text>
  <text x="394" y="458" text-anchor="middle" fill="#5b5b62" font-size="11">tools · resources</text>
  <text x="394" y="474" text-anchor="middle" fill="#5b5b62" font-size="11">stdio · streamable-HTTP</text>

  <rect x="492" y="404" width="148" height="80" rx="6" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="566" y="424" text-anchor="middle" fill="#1a1a2e" font-weight="600">Plugin runtime</text>
  <text x="566" y="440" text-anchor="middle" fill="#5b5b62" font-size="11">adapter plugins · hooks</text>
  <text x="566" y="458" text-anchor="middle" fill="#5b5b62" font-size="11">UI ext · webhooks</text>
  <text x="566" y="474" text-anchor="middle" fill="#5b5b62" font-size="11">DB namespaces</text>

  <!-- Adapter zone -->
  <rect x="712" y="80" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="103" text-anchor="middle" fill="#1a1a2e" font-weight="600">claude-local</text>

  <rect x="712" y="124" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="147" text-anchor="middle" fill="#1a1a2e" font-weight="600">codex-local</text>

  <rect x="712" y="168" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="191" text-anchor="middle" fill="#1a1a2e" font-weight="600">cursor-local</text>

  <rect x="712" y="212" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="235" text-anchor="middle" fill="#1a1a2e" font-weight="600">gemini-local</text>

  <rect x="712" y="256" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="279" text-anchor="middle" fill="#1a1a2e" font-weight="600">opencode-local</text>

  <rect x="712" y="300" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e"/>
  <text x="808" y="323" text-anchor="middle" fill="#1a1a2e" font-weight="600">pi-local · acpx-local</text>

  <rect x="712" y="344" width="192" height="36" rx="4" fill="#fde7e3" stroke="#c84a3a"/>
  <text x="808" y="367" text-anchor="middle" fill="#c84a3a" font-weight="700">openclaw-gateway</text>

  <rect x="712" y="388" width="192" height="36" rx="4" fill="#ffffff" stroke="#1a1a2e" stroke-dasharray="3 3"/>
  <text x="808" y="411" text-anchor="middle" fill="#1a1a2e" font-weight="600">process · http (generic)</text>

  <rect x="712" y="432" width="192" height="52" rx="4" fill="#ffffff" stroke="#5b5b62" stroke-dasharray="2 2"/>
  <text x="808" y="453" text-anchor="middle" fill="#5b5b62" font-size="11">adapter plugin</text>
  <text x="808" y="471" text-anchor="middle" fill="#5b5b62" font-size="11">(externally installed)</text>

  <!-- Arrows -->
  <path d="M244,128 L320,104" stroke="#c84a3a" stroke-width="2" fill="none" marker-end="url(#arrR)"/>
  <path d="M244,202 L320,164" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <path d="M244,358 L320,360" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>

  <path d="M640,104 L712,98" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <path d="M640,232 L712,278" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <path d="M640,232 L712,322" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>
  <path d="M640,360 L712,406" stroke="#1a1a2e" stroke-width="1.5" fill="none" marker-end="url(#arr1)"/>

  <!-- pingback arrow -->
  <path d="M712,362 C660,420 660,420 640,232" stroke="#c84a3a" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrR)"/>
  <text x="660" y="490" fill="#c84a3a" font-size="11" font-style="italic">pingback / cost report</text>
</svg>
