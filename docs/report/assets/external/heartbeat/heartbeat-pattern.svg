@startuml
left to right direction

!include ../style.puml 
object SendingServer
object ReceivingServer

SendingServer - -> ReceivingServer: "<&reload>Heartbeat\nEvery 100ms"

note bottom of ReceivingServer
<&reload> Check Every 1s
end note

@enduml

@startuml
left to right direction


skinparam shadowing false
skinparam sequenceParticipant{
    BackgroundColor #F7F8FE
  BorderColor #070D4A
}
skinparam sequenceLifeLine {
   BackgroundColor #F7F8FE
  BorderColor #070D4A
}
skinparam sequence {
  ArrowColor #070D4A
}

skinparam Note {
    BackgroundColor #F7F8FE
  BorderColor #070D4A
}
skinparam Node {
    BackgroundColor #F7F8FE
  BorderColor #070D4A
}

skinparam object {
    BackgroundColor #F7F8FE
  BorderColor #070D4A
}

skinparam actor {
    BackgroundColor #F7F8FE
  BorderColor #070D4A
}



hide footbox
object SendingServer
object ReceivingServer

SendingServer - -> ReceivingServer: "<&reload>Heartbeat\nEvery 100ms"

note bottom of ReceivingServer
<&reload> Check Every 1s
end note

@enduml

