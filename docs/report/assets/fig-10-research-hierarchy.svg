<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="'Inter','Noto Sans KR',sans-serif" font-size="12">
  <defs>
    <marker id="m10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b5b62"/>
    </marker>
  </defs>
  <rect width="1100" height="660" fill="#fafafa"/>

  <!-- Layer band labels -->
  <g font-size="11" letter-spacing="2" font-weight="700">
    <text x="40" y="46" fill="#5b5b62">L1  ·  GENERAL INFRASTRUCTURE — broad ecosystem standards</text>
    <text x="40" y="190" fill="#5b5b62">L2  ·  ORCHESTRATION PATTERNS — control-plane / heartbeat / cost</text>
    <text x="40" y="334" fill="#0f2c59">L3  ·  PAPERCLIP CORE — concrete control-plane implementation</text>
    <text x="40" y="478" fill="#5b5b62">L4  ·  EXECUTION RUNTIMES — agents that Paperclip drives</text>
  </g>

  <!-- L1 -->
  <g>
    <rect x="40" y="56" width="240" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="160" y="78" text-anchor="middle" fill="#1a1a2e" font-weight="700">R7  pnpm workspace</text>
    <text x="160" y="96" text-anchor="middle" fill="#5b5b62" font-size="11">monorepo · workspace:* · filter</text>
    <text x="160" y="114" text-anchor="middle" fill="#5b5b62" font-size="11">→ /server /ui /packages/*</text>
    <text x="160" y="142" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/07-pnpm-monorepo.md</text>

    <rect x="296" y="56" width="240" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="416" y="78" text-anchor="middle" fill="#1a1a2e" font-weight="700">R6  Drizzle + PGlite</text>
    <text x="416" y="96" text-anchor="middle" fill="#5b5b62" font-size="11">type-safe ORM · WASM Postgres</text>
    <text x="416" y="114" text-anchor="middle" fill="#5b5b62" font-size="11">→ packages/db (75+ tables)</text>
    <text x="416" y="142" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/06-drizzle-pglite.md</text>

    <rect x="552" y="56" width="240" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="672" y="78" text-anchor="middle" fill="#1a1a2e" font-weight="700">R8  React · Vite · shadcn/ui</text>
    <text x="672" y="96" text-anchor="middle" fill="#5b5b62" font-size="11">SPA · HMR · TanStack Query</text>
    <text x="672" y="114" text-anchor="middle" fill="#5b5b62" font-size="11">→ /ui board interface</text>
    <text x="672" y="142" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/08-react-vite-shadcn.md</text>

    <rect x="808" y="56" width="252" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="934" y="78" text-anchor="middle" fill="#1a1a2e" font-weight="700">R9  Live events &amp; heartbeat patterns</text>
    <text x="934" y="96" text-anchor="middle" fill="#5b5b62" font-size="11">WebSocket(main) / SSE(plugin) · liveness · watchdog</text>
    <text x="934" y="114" text-anchor="middle" fill="#5b5b62" font-size="11">→ realtime/live-events-ws.ts · scheduler</text>
    <text x="934" y="142" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/09-sse-heartbeat-patterns.md</text>
  </g>

  <!-- L2 -->
  <g>
    <rect x="160" y="200" width="320" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="320" y="222" text-anchor="middle" fill="#1a1a2e" font-weight="700">R1  Agent orchestration · control plane</text>
    <text x="320" y="240" text-anchor="middle" fill="#5b5b62" font-size="11">orchestrator-worker · single-assignee</text>
    <text x="320" y="258" text-anchor="middle" fill="#5b5b62" font-size="11">atomic checkout · durable execution</text>
    <text x="320" y="288" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/01-agent-orchestration-control-plane.md</text>

    <rect x="500" y="200" width="320" height="118" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="660" y="222" text-anchor="middle" fill="#1a1a2e" font-weight="700">R10  LLM cost · budget enforcement</text>
    <text x="660" y="240" text-anchor="middle" fill="#5b5b62" font-size="11">cached/output token model</text>
    <text x="660" y="258" text-anchor="middle" fill="#5b5b62" font-size="11">soft alert + hard auto-pause</text>
    <text x="660" y="288" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/10-llm-cost-budgeting.md</text>
  </g>

  <!-- L3 Paperclip core -->
  <rect x="280" y="344" width="540" height="120" rx="10" fill="#dde7f3" stroke="#0f2c59" stroke-width="1.5"/>
  <text x="550" y="372" text-anchor="middle" fill="#0f2c59" font-weight="700" font-size="16">Paperclip — control plane</text>
  <text x="550" y="394" text-anchor="middle" fill="#1a1a2e" font-size="12">company · agents · issues · cost_events · heartbeat_runs</text>
  <text x="550" y="412" text-anchor="middle" fill="#1a1a2e" font-size="12">approvals · budget_policies · activity_log · plugin runtime · MCP server</text>
  <text x="550" y="436" text-anchor="middle" fill="#5b5b62" font-size="11" font-style="italic">"if it can receive a heartbeat, it's hired"</text>
  <text x="550" y="454" text-anchor="middle" fill="#5b5b62" font-size="11" font-style="italic">github.com/paperclipai/paperclip</text>

  <!-- L4 -->
  <g>
    <rect x="40" y="492" width="248" height="120" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="164" y="514" text-anchor="middle" fill="#1a1a2e" font-weight="700">R2  MCP</text>
    <text x="164" y="532" text-anchor="middle" fill="#5b5b62" font-size="11">model context protocol</text>
    <text x="164" y="550" text-anchor="middle" fill="#5b5b62" font-size="11">→ packages/mcp-server</text>
    <text x="164" y="568" text-anchor="middle" fill="#5b5b62" font-size="11">→ adapters' MCP register</text>
    <text x="164" y="592" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/02-...md</text>

    <rect x="304" y="492" width="248" height="120" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="428" y="514" text-anchor="middle" fill="#1a1a2e" font-weight="700">R3  Claude Code (headless)</text>
    <text x="428" y="532" text-anchor="middle" fill="#5b5b62" font-size="11">claude -p · Agent SDK</text>
    <text x="428" y="550" text-anchor="middle" fill="#5b5b62" font-size="11">→ adapters/claude-local</text>
    <text x="428" y="568" text-anchor="middle" fill="#5b5b62" font-size="11">→ default agent skill</text>
    <text x="428" y="592" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/03-...md</text>

    <rect x="568" y="492" width="248" height="120" rx="8" fill="#ffffff" stroke="#1a1a2e"/>
    <text x="692" y="514" text-anchor="middle" fill="#1a1a2e" font-weight="700">R4  Codex · Cursor · Gemini · OpenCode · Pi</text>
    <text x="692" y="532" text-anchor="middle" fill="#5b5b62" font-size="11">headless coding agents</text>
    <text x="692" y="550" text-anchor="middle" fill="#5b5b62" font-size="11">→ adapters/{codex,cursor,</text>
    <text x="692" y="568" text-anchor="middle" fill="#5b5b62" font-size="11">  gemini,opencode,pi}-local</text>
    <text x="692" y="592" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/04-...md</text>

    <rect x="832" y="492" width="228" height="120" rx="8" fill="#fde7e3" stroke="#c84a3a"/>
    <text x="946" y="514" text-anchor="middle" fill="#c84a3a" font-weight="700">R5  OpenClaw + Agent Companies</text>
    <text x="946" y="532" text-anchor="middle" fill="#5b5b62" font-size="11">remote agent runtime</text>
    <text x="946" y="550" text-anchor="middle" fill="#5b5b62" font-size="11">→ adapters/openclaw-gateway</text>
    <text x="946" y="568" text-anchor="middle" fill="#5b5b62" font-size="11">→ company portability format</text>
    <text x="946" y="592" text-anchor="middle" fill="#5b5b62" font-size="10" font-style="italic">docs/research/05-...md</text>
  </g>

  <!-- arrows: L1 → L3 -->
  <g stroke="#5b5b62" stroke-width="1" fill="none" stroke-dasharray="3 3">
    <path d="M160,174 L320,344" marker-end="url(#m10)"/>
    <path d="M416,174 L460,344" marker-end="url(#m10)"/>
    <path d="M672,174 L640,344" marker-end="url(#m10)"/>
    <path d="M934,174 L780,344" marker-end="url(#m10)"/>
  </g>
  <!-- arrows: L2 → L3 -->
  <g stroke="#1a1a2e" stroke-width="1.4" fill="none">
    <path d="M320,318 L420,344" marker-end="url(#m10)"/>
    <path d="M660,318 L680,344" marker-end="url(#m10)"/>
  </g>
  <!-- arrows: L3 → L4 -->
  <g stroke="#0f2c59" stroke-width="1" fill="none" stroke-dasharray="3 3">
    <path d="M420,464 L240,492" marker-end="url(#m10)"/>
    <path d="M500,464 L420,492" marker-end="url(#m10)"/>
    <path d="M600,464 L660,492" marker-end="url(#m10)"/>
    <path d="M680,464 L900,492" marker-end="url(#m10)"/>
  </g>

  <!-- Footer note -->
  <text x="40" y="640" font-size="11" fill="#5b5b62">L1 = 일반 인프라 표준 / L2 = 오케스트레이션 패턴 / L3 = Paperclip 본체 / L4 = Paperclip이 구동하는 실행 런타임</text>
</svg>
