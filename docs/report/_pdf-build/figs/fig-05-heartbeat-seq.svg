<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" font-family="'Inter','Noto Sans KR',sans-serif" font-size="12">
  <defs>
    <marker id="seq" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a2e"/>
    </marker>
    <marker id="seqR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c84a3a"/>
    </marker>
  </defs>
  <rect width="1080" height="640" fill="#fafafa"/>

  <!-- Lifelines -->
  <g font-weight="700" fill="#0f2c59" font-size="13">
    <rect x="60" y="36" width="140" height="36" rx="4" fill="#dde7f3" stroke="#0f2c59"/>
    <text x="130" y="58" text-anchor="middle">Scheduler</text>
    <rect x="240" y="36" width="140" height="36" rx="4" fill="#dde7f3" stroke="#0f2c59"/>
    <text x="310" y="58" text-anchor="middle">Adapter</text>
    <rect x="420" y="36" width="140" height="36" rx="4" fill="#fde7e3" stroke="#c84a3a"/>
    <text x="490" y="58" text-anchor="middle" fill="#c84a3a">Agent runtime</text>
    <rect x="600" y="36" width="160" height="36" rx="4" fill="#dde7f3" stroke="#0f2c59"/>
    <text x="680" y="58" text-anchor="middle">Paperclip API</text>
    <rect x="800" y="36" width="120" height="36" rx="4" fill="#dde7f3" stroke="#0f2c59"/>
    <text x="860" y="58" text-anchor="middle">PostgreSQL</text>
    <rect x="940" y="36" width="100" height="36" rx="4" fill="#dde7f3" stroke="#0f2c59"/>
    <text x="990" y="58" text-anchor="middle">WS → UI</text>
  </g>

  <g stroke="#d4d4d8" stroke-dasharray="3 3">
    <line x1="130" y1="72" x2="130" y2="600"/>
    <line x1="310" y1="72" x2="310" y2="600"/>
    <line x1="490" y1="72" x2="490" y2="600"/>
    <line x1="680" y1="72" x2="680" y2="600"/>
    <line x1="860" y1="72" x2="860" y2="600"/>
    <line x1="990" y1="72" x2="990" y2="600"/>
  </g>

  <!-- Steps -->
  <g font-size="11" fill="#1a1a2e">
  <text x="20" y="98" text-anchor="end" fill="#5b5b62">t₀ tick</text>
  <path d="M130,100 L308,100" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="218" y="92" text-anchor="middle">cron tick · select due agents</text>

  <text x="20" y="138" text-anchor="end" fill="#5b5b62">t₁ checkout</text>
  <path d="M310,140 L678,140" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="494" y="132" text-anchor="middle">POST /api/issues/:id/checkout (atomic)</text>
  <path d="M680,156 L856,156" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="768" y="148" text-anchor="middle">UPDATE … WHERE checkout_run_id IS NULL</text>
  <path d="M858,176 L682,176" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="770" y="190" text-anchor="middle" fill="#5b5b62">200 OK · execution_run_id set</text>

  <text x="20" y="222" text-anchor="end" fill="#5b5b62">t₂ invoke</text>
  <path d="M310,224 L488,224" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="398" y="216" text-anchor="middle">spawn(claude -p / codex exec / http POST)</text>
  <text x="398" y="240" text-anchor="middle" fill="#5b5b62">stream stdout JSON</text>

  <text x="20" y="278" text-anchor="end" fill="#5b5b62">t₃ work</text>
  <path d="M490,280 L678,280" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="584" y="272" text-anchor="middle">GET /api/issues/:id  (thin ping context)</text>
  <path d="M680,300 L488,300" stroke="#1a1a2e" stroke-width="1.4" stroke-dasharray="2 2" marker-end="url(#seq)"/>
  <text x="584" y="316" text-anchor="middle" fill="#5b5b62">issue + comments + parents</text>

  <text x="20" y="344" text-anchor="end" fill="#5b5b62">t₄ updates</text>
  <path d="M490,346 L678,346" stroke="#c84a3a" stroke-width="1.4" marker-end="url(#seqR)"/>
  <text x="584" y="338" text-anchor="middle" fill="#c84a3a">POST /api/cost-events  (token usage)</text>
  <path d="M680,366 L856,366" stroke="#c84a3a" stroke-width="1.4" marker-end="url(#seqR)"/>
  <text x="768" y="382" text-anchor="middle" fill="#5b5b62">INSERT cost_events · UPDATE rollups</text>
  <path d="M680,400 L988,400" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="834" y="392" text-anchor="middle">live event: heartbeat.run.* · activity.logged</text>

  <text x="20" y="446" text-anchor="end" fill="#5b5b62">t₅ status</text>
  <path d="M310,448 L488,448" stroke="#1a1a2e" stroke-width="1.4" stroke-dasharray="2 2" marker-end="url(#seq)"/>
  <text x="398" y="440" text-anchor="middle" fill="#5b5b62">poll process · stdout watchdog</text>

  <text x="20" y="490" text-anchor="end" fill="#5b5b62">t₆ done</text>
  <path d="M490,492 L678,492" stroke="#c84a3a" stroke-width="1.4" marker-end="url(#seqR)"/>
  <text x="584" y="484" text-anchor="middle" fill="#c84a3a">PATCH /api/issues/:id  status=in_review</text>
  <path d="M680,512 L856,512" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="768" y="528" text-anchor="middle" fill="#5b5b62">clear execution_run_id · log activity</text>
  <path d="M680,548 L988,548" stroke="#1a1a2e" stroke-width="1.4" marker-end="url(#seq)"/>
  <text x="834" y="540" text-anchor="middle">live event: activity.logged (entity_type=issue)</text>

  <text x="20" y="588" text-anchor="end" fill="#5b5b62">budget breach?</text>
  <path d="M860,590 L132,590" stroke="#c84a3a" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#seqR)"/>
  <text x="496" y="582" text-anchor="middle" fill="#c84a3a">hard ceiling crossed → auto-pause agent → cancel current run</text>
  </g>
</svg>
